use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  bind_address: "0.0.0.0"
  port: 8080

search:
  formats:
    - html
    - json
  autocomplete: ""
  default_lang: "en"

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: bing
    engine: bing
    shortcut: b
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: github
    engine: github
    shortcut: gh
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
