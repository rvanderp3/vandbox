# Vandbox Network Allowlist
# Format: host:port or CIDR:port
# Special entry "dns:53" enables DNS resolution to the container's resolver
# Lines starting with # are comments

# DNS (required for hostname-based entries to resolve)
dns:53

# PyPI (for pip install)
pypi.org:443
files.pythonhosted.org:443

# GitHub API
api.github.com:443
